services:
  db:
    image: mysql:8.4
    container_name: neeews-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # 형식: "호스트IP:호스트포트:컨테이너포트"
    # - 오른쪽 3306: db 컨테이너 안에서 MySQL이 실제로 듣고 있는 포트 (고정값, 못 바꿈)
    # - 왼쪽 127.0.0.1:3306: 그 포트를 VPS의 루프백(자기 자신)에만 열어주는 것.
    #   0.0.0.0으로 하면 인터넷 전체에 노출되니, 외부 접속은 SSH 터널로만 하도록 이렇게 막아둔다.
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: neeews-api
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://localhost:3306/${DB_NAME}?serverTimezone=UTC
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      BASE_URL: ${BASE_URL}
    volumes:
      - /home/ubuntu/images/articles:/app/images/articles

volumes:
  mysql_data:
