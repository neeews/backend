name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci-root
          MYSQL_DATABASE: neeews
          MYSQL_USER: neeews
          MYSQL_PASSWORD: ci-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew build
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/neeews?serverTimezone=UTC
          DB_USER: neeews
          DB_PASSWORD: ci-password
          JWT_SECRET: ci-only-dummy-secret-key-for-context-load-test-0123456789abcdef
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-dummy

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ubuntu
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            if [ -d "/home/ubuntu/backend/.git" ]; then
              cd /home/ubuntu/backend
              git pull
            else
              git clone https://github.com/neeews/backend /home/ubuntu/backend
              cd /home/ubuntu/backend
            fi

            docker compose up -d --build
